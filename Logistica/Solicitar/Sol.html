<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Solicitud de Materiales</title>
  <link rel="stylesheet" href="./css/Soli.css">
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2>Solicitud de Materiales y Herramientas</h2>

    <div class="form-top">
      <input type="text" id="obra" placeholder="Obra">
      <input type="text" id="residente" placeholder="Residente">
      <input type="date" id="fecha">
      <input type="time" id="hora">
      <button onclick="enviarSolicitud()">Enviar</button>
    </div>
  </div>

  <!-- MATERIALES -->
  <h3>Materiales</h3>
  <table id="tablaMateriales">
    <thead>
      <tr>
        <th>Material</th>
        <th>Unidad</th>
        <th>Cantidad</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <button onclick="agregarFila('tablaMateriales')">+ Agregar Material</button>

  <!-- HERRAMIENTAS -->
  <h3>Herramientas</h3>
  <table id="tablaHerramientas">
    <thead>
      <tr>
        <th>Herramienta</th>
        <th>Unidad</th>
        <th>Cantidad</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <button onclick="agregarFila('tablaHerramientas')">+ Agregar Herramienta</button>

  <!-- NOTAS -->
  <h3>Notas</h3>
  <textarea id="notas"></textarea>

</div>

<script src="./js/Soli.js"></script>
</body>
</html>
